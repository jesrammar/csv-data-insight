global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording.yml
  - /etc/prometheus/alerts.local.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: enterpriseiq-backend-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8082"]
