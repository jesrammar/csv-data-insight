server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/enterpriseiq
    username: enterpriseiq
    password: enterpriseiq
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  upload:
    max-bytes: 20971520
    max-bytes-by-plan:
      bronze: 10485760
      gold: 31457280
      platinum: 62914560
    xlsx:
      max-rows: 120000
      max-seconds: 25
  jwt:
    secret: "change-this-in-prod-please-change-this-in-prod"
    access-expiration-minutes: 60
    refresh-expiration-days: 30
    issuer: "enterpriseiq"
  universal:
    max-analyze-rows: 50000
    max-analyze-rows-by-plan:
      bronze: 15000
      gold: 50000
      platinum: 100000
    max-seconds: 25
    max-seconds-by-plan:
      bronze: 15
      gold: 25
      platinum: 45
  storage:
    imports: ./storage/imports
    reports: ./storage/reports
    universal: ./storage/universal
    inbox: ./storage/inbox
    retention:
      enabled: true
      imports-days: 30
      reports-days: 180
      universal-days: 30
      keep-import-files-per-company: 10
      keep-report-files-per-company: 24
      keep-universal-files-per-company: 3
  scheduler:
    import-fixed-delay-ms: 120000
    token-cleanup-fixed-delay-ms: 86400000
    refresh-revoked-retention-days: 7
    automation-worker-fixed-delay-ms: 5000
    inbox-fixed-delay-ms: 30000
    storage-cleanup-fixed-delay-ms: 86400000
    kpi-daily-cron: "0 15 2 * * *"
    macro-daily-cron: "0 5 2 * * *"
    kpi-weekly-cron: "0 30 3 * * 0"
    report-monthly-cron: "0 0 6 1 * *"
  password:
    min-length: 10
    require-upper: true
    require-lower: true
    require-digit: true
  metrics:
    error-tag:
      max-unique: 40
      other-label: "other"
  macro:
    ine:
      ipc-table-id: 24077
    bde:
      euribor1y-series: "D_1NBAF472"
    ecb:
      usd-eur-series: "EXR/M.USD.EUR.SP00.A"

logging:
  level:
    com.asecon.enterpriseiq: INFO

management:
  server:
    port: 8082
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: "never"
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ingestion.import.process.duration: true
        ingestion.universal.analyze.duration: true
        ingestion.xlsx.convert.duration: true
    tags:
      application: "enterpriseiq"

cors:
  allowed-origins: "http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174"
