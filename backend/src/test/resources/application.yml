spring:
  datasource:
    url: jdbc:h2:mem:enterpriseiq_test;MODE=PostgreSQL;NON_KEYWORDS=YEAR,VALUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    scheduling:
      enabled: false

app:
  upload:
    xlsx:
      max-rows: 120000
      max-seconds: 25
  jwt:
    secret: "test-secret-test-secret-test-secret-1234"
    access-expiration-minutes: 60
    refresh-expiration-days: 30
    issuer: "enterpriseiq"
  universal:
    max-analyze-rows: 50000
    max-seconds: 25
  storage:
    imports: ./target/test-storage/imports
    reports: ./target/test-storage/reports
    universal: ./target/test-storage/universal
    inbox: ./target/test-storage/inbox
  scheduler:
    import-fixed-delay-ms: 120000
    token-cleanup-fixed-delay-ms: 86400000
    refresh-revoked-retention-days: 7

cors:
  allowed-origins: "http://localhost:5173"

management:
  server:
    port: 0
