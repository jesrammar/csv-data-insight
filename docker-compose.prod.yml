services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enterpriseiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your CI secrets}
      POSTGRES_DB: ${POSTGRES_DB:-enterpriseiq}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterpriseiq -d enterpriseiq"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ghcr.io/${IMAGE_OWNER:-local}/enterpriseiq-backend:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enterpriseiq
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-enterpriseiq}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your CI secrets}
      # If you serve the SPA + API from the same origin (nginx proxy /api), CORS is usually not needed.
      # Only set this if you consume the API cross-origin (e.g. separate domains).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      APP_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or your CI secrets}
      APP_COOKIES_SECURE: ${APP_COOKIES_SECURE:-true}
      APP_COOKIES_SAME_SITE: ${APP_COOKIES_SAME_SITE:-Strict}
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-8082}
      MANAGEMENT_SERVER_ADDRESS: ${MANAGEMENT_SERVER_ADDRESS:-0.0.0.0}
    ports:
      # Keep backend port private; use the frontend proxy (/api) for normal traffic.
      - "127.0.0.1:${BACKEND_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-storage:/app/storage

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-2GB}"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./ops/prometheus/recording.yml:/etc/prometheus/recording.yml:ro
      - ./ops/prometheus/alerts.local.yml:/etc/prometheus/alerts.local.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.28.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--config.expand-env=true"
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"

  grafana:
    image: grafana/grafana-oss:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env or your CI secrets}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_DISABLE_LOGIN_FORM:-false}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  frontend:
    image: ghcr.io/${IMAGE_OWNER:-local}/enterpriseiq-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend-storage:
  prometheus-data:
  grafana-data:
  alertmanager-data:
