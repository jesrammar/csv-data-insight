services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: enterpriseiq
      POSTGRES_PASSWORD: enterpriseiq
      POSTGRES_DB: enterpriseiq
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterpriseiq -d enterpriseiq"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enterpriseiq
      SPRING_DATASOURCE_USERNAME: enterpriseiq
      SPRING_DATASOURCE_PASSWORD: enterpriseiq
      CORS_ALLOWED_ORIGINS: http://localhost:5174
      MANAGEMENT_SERVER_PORT: 8082
      MANAGEMENT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-storage:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8081
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  backend-storage:
